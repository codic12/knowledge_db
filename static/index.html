<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Marked.js for rendering markdown in responses -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-app: #09090b;
            --bg-sidebar: #0e0e11;
            --bg-card: #18181b;
            --bg-input: #09090b;
            --border: #27272a;
            
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            
            --success: #10b981;
            --error: #ef4444;
            
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Left Chat History Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            flex-shrink: 0;
            position: relative;
        }

        .resize-handle {
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            cursor: col-resize;
            background-color: transparent;
            transition: background-color 0.15s ease;
            z-index: 20;
        }

        .resize-handle:hover, .resize-handle.active {
            background-color: var(--accent);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .brand-icon {
            width: 22px;
            height: 22px;
            background-color: var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .brand-logo {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        .new-chat-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 20px;
            transition: background-color 0.15s ease;
            flex-shrink: 0;
        }

        .new-chat-btn:hover {
            background-color: var(--bg-card);
        }

        .history-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-right: -10px;
            padding-right: 10px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.15s ease;
            font-size: 0.825rem;
            color: var(--text-secondary);
        }

        .history-item:hover {
            background-color: var(--bg-card);
            color: var(--text-primary);
        }

        .history-item.active {
            background-color: rgba(37, 99, 235, 0.12);
            color: var(--text-primary);
            border-left: 2px solid var(--accent);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .history-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .history-delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2px;
            border-radius: 3px;
            transition: color 0.15s ease, background-color 0.15s ease;
        }

        .history-item:hover .history-delete-btn {
            display: flex;
        }

        .history-delete-btn:hover {
            color: var(--error);
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* Responsive Mobile Sidebar Backdrop overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            z-index: 8;
        }

        /* Main Content Panel */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header Ingestion Toolbar */
        .chat-header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background-color: var(--bg-sidebar);
            z-index: 5;
            flex-shrink: 0;
            position: relative;
        }

        .menu-toggle-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .header-title {
            display: none;
            font-size: 0.925rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        .config-toggle-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .ingest-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .ingest-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ingest-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .path-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .chat-header input[type="text"] {
            width: 180px;
            background-color: var(--bg-app);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: border-color 0.15s ease;
        }

        .chat-header input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .chat-header .switch-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .chat-header .switch-container input {
            display: none;
        }

        .chat-header .switch-slider {
            position: relative;
            width: 32px;
            height: 16px;
            background-color: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .chat-header .switch-slider::before {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .chat-header .switch-container input:checked + .switch-slider {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .chat-header .switch-container input:checked + .switch-slider::before {
            transform: translateX(16px);
            background-color: white;
        }

        .chat-header .btn-ingest {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header .btn-ingest:hover {
            background-color: var(--accent-hover);
        }

        .chat-header .btn-ingest:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Ingestion Status Panel */
        .inline-status {
            display: none; /* Hidden by default - no "ready" label at startup */
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background-color: var(--bg-app);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            max-width: 300px;
        }

        .inline-status .status-pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .inline-status.processing .status-pulse-dot {
            background-color: var(--accent);
            animation: statusPulse 1.5s infinite ease-in-out;
        }

        .inline-status.success .status-pulse-dot {
            background-color: var(--success);
        }

        .inline-status.error .status-pulse-dot {
            background-color: var(--error);
        }

        @keyframes statusPulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        .btn-loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Chat Window */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 32px 120px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-scroller-inner {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            animation: messageFadeIn 0.2s ease-out forwards;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(39, 39, 42, 0.4);
        }

        .message:last-child {
            border-bottom: none;
        }

        @keyframes messageFadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-body-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-x: auto;
        }

        .message-username {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .message-content {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        /* Markdown Rendering inside Content */
        .message-content p {
            margin-bottom: 10px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            color: white;
            font-weight: 600;
        }

        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background-color: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.85em;
            color: #f43f5e;
        }

        .message-content pre {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin: 12px 0;
            overflow-x: auto;
        }

        .message-content pre code {
            background-color: transparent;
            border: none;
            padding: 0;
            color: #cbd5e1;
            font-size: 0.8rem;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0 8px 18px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content li:last-child {
            margin-bottom: 0;
        }

        /* Citation System */
        .citations-section-header {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-top: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .citations-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .citation-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.75rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: border-color 0.15s ease;
        }

        .citation-chip:hover {
            border-color: var(--accent);
        }

        .citation-page-badge {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .inline-citation-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background-color: rgba(37, 99, 235, 0.12);
            border: 1px solid rgba(37, 99, 235, 0.3);
            color: #60a5fa;
            padding: 1px 6px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.15s ease-in-out;
            vertical-align: middle;
            margin: 0 2px;
        }

        .inline-citation-link:hover {
            background-color: rgba(37, 99, 235, 0.22);
            border-color: #3b82f6;
            color: #93c5fd;
            text-decoration: none;
            transform: translateY(-0.5px);
        }

        /* Input Container Bottom */
        .chat-input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 32px 32px 32px;
            background: linear-gradient(to top, var(--bg-app) 80%, transparent);
            display: flex;
            justify-content: center;
            z-index: 4;
        }

        .chat-input-box-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-input-container {
            position: relative;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            transition: border-color 0.15s ease;
        }

        .chat-input-container:focus-within {
            border-color: var(--accent);
        }

        .chat-input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 14px 50px 14px 16px;
            font-size: 0.9rem;
        }

        .chat-input-field:focus {
            outline: none;
        }

        .btn-chat-send {
            position: absolute;
            right: 10px;
            width: 32px;
            height: 32px;
            background-color: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .chat-input-field:not(:placeholder-shown) ~ .btn-chat-send,
        .chat-input-container:focus-within .btn-chat-send {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-chat-send:hover {
            opacity: 0.9;
        }

        .input-disclaimer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* Clean Typing Indicator */
        .typing-bubble {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 5px;
            height: 5px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            display: inline-block;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.3); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 99px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ========================================================
           Mobile Responsive Styles (max-width: 768px)
           ======================================================== */
        @media (max-width: 768px) {
            /* Sidebar transitions offscreen */
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                width: 260px !important; /* Fixed width on mobile */
                transform: translateX(-100%);
                transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay.open {
                display: block;
            }
            .resize-handle {
                display: none !important; /* Hide resize handle on mobile */
            }

            /* Responsive Ingest Header Panel */
            .menu-toggle-btn {
                display: flex;
            }
            .header-title {
                display: block;
            }
            .config-toggle-btn {
                display: flex;
            }

            /* Ingest toolbar turns into collapsible drawer */
            .ingest-toolbar {
                display: none;
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background-color: var(--bg-sidebar);
                border-bottom: 1px solid var(--border);
                padding: 16px 24px;
                z-index: 4;
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            }
            .ingest-toolbar.open {
                display: flex;
            }
            .ingest-group {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .chat-header input[type="text"] {
                width: 100% !important;
            }
            .ingest-actions {
                justify-content: space-between;
            }
            .inline-status {
                max-width: 100%;
                justify-content: center;
            }

            /* Compact Padding for Chat on Mobile */
            .chat-container {
                padding: 16px 16px 100px 16px;
            }
            .chat-scroller-inner {
                gap: 20px;
            }
            .chat-input-area {
                padding: 12px 16px 20px 16px;
            }
            .chat-header {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Responsive Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Left Sidebar (Chat History) -->
    <div class="sidebar">
        <div class="resize-handle" id="resize-handle"></div>

        <div class="brand-container">
            <div class="brand-icon">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
            </div>
            <div class="brand-logo">Intelligence</div>
        </div>
        
        <button class="new-chat-btn" onclick="startNewChat()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New Chat
        </button>

        <div class="history-label">Chats History</div>
        <div class="history-list" id="chat-history-list">
            <!-- Populated via javascript -->
        </div>
    </div>

    <!-- Main Content Panel -->
    <div class="main-content">
        <!-- Top Toolbar -->
        <div class="chat-header">
            <!-- Hamburger menu (Mobile Only) -->
            <button class="menu-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle Menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>

            <!-- Flat Mobile Header Title (Mobile Only) -->
            <div class="header-title">Document Intelligence</div>

            <!-- Ingestion elements (Inline desktop, drawer overlay on mobile) -->
            <div class="ingest-toolbar" id="ingest-toolbar">
                <div class="ingest-group">
                    <span class="path-label">Ingest Path:</span>
                    <input type="text" id="s3-path" placeholder="Corpus path..." value="mock_s3/">
                </div>
                
                <div class="ingest-actions">
                    <label class="switch-container">
                        <span>Subfolders</span>
                        <input type="checkbox" id="cascade" checked>
                        <span class="switch-slider"></span>
                    </label>
                    
                    <button class="btn-ingest" id="ingest-btn" onclick="ingestDocs()">
                        <svg id="ingest-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                        <span id="ingest-btn-text">Ingest</span>
                    </button>
                </div>
                
                <div class="inline-status" id="status-panel">
                    <span class="status-pulse-dot"></span>
                    <span id="status-desc-text">Ready</span>
                </div>
            </div>

            <!-- Ingestion Toggle Button (Mobile Only) -->
            <button class="config-toggle-btn" onclick="toggleConfigDrawer()" aria-label="Ingestion Options">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
            </button>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chat-container">
            <div class="chat-scroller-inner" id="messages-wrapper">
                <!-- Message content loaded via loadChat() -->
            </div>
        </div>

        <!-- Chat Input bar -->
        <div class="chat-input-area">
            <div class="chat-input-box-wrapper">
                <div class="chat-input-container">
                    <input type="text" id="question-input" class="chat-input-field" placeholder="Ask details about ingested documents..." onkeypress="handleKeyPress(event)">
                    <button class="btn-chat-send" onclick="askQuestion()" id="send-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <div class="input-disclaimer">
                    Factual lookup citing page reference sources.
                </div>
            </div>
        </div>
    </div>

    <script>
        // State for managing chat sessions efficiently in LocalStorage
        let currentChatId = null;
        let chatIndex = [];

        async function initChats() {
            try {
                const res = await fetch('/api/chats');
                if (res.ok) {
                    chatIndex = await res.json();
                    saveIndexToStorage();
                } else {
                    throw new Error("Server error");
                }
            } catch (e) {
                console.warn("Could not fetch chats from server, falling back to localStorage", e);
                try {
                    const storedIndex = localStorage.getItem('doc_intel_chat_index');
                    chatIndex = storedIndex ? JSON.parse(storedIndex) : [];
                } catch (err) {
                    chatIndex = [];
                }
            }
            
            if (chatIndex.length === 0) {
                await startNewChat();
            } else {
                await loadChat(chatIndex[0].id);
            }
            renderChatHistory();
            makeSidebarResizable();
        }

        function saveIndexToStorage() {
            localStorage.setItem('doc_intel_chat_index', JSON.stringify(chatIndex));
        }

        async function persistChatToServer(chatId) {
            const chatMeta = chatIndex.find(c => c.id === chatId);
            if (!chatMeta) return;
            
            let messages = [];
            try {
                const storedMsgs = localStorage.getItem(`doc_intel_chat_msg_${chatId}`);
                if (storedMsgs) {
                    messages = JSON.parse(storedMsgs);
                }
            } catch (e) {}
            
            try {
                await fetch('/api/chats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: chatMeta.id,
                        title: chatMeta.title,
                        updatedAt: chatMeta.updatedAt,
                        messages: messages
                    })
                });
            } catch (e) {
                console.error("Failed to persist chat to server", e);
            }
        }

        async function startNewChat() {
            const newId = Date.now().toString();
            const newChatMeta = {
                id: newId,
                title: 'New Chat',
                updatedAt: Date.now()
            };
            
            chatIndex.unshift(newChatMeta);
            saveIndexToStorage();
            
            localStorage.setItem(`doc_intel_chat_msg_${newId}`, JSON.stringify([]));
            
            await persistChatToServer(newId);
            
            await loadChat(newId);
            renderChatHistory();
        }

        async function loadChat(id) {
            currentChatId = id;
            
            let messages = [];
            try {
                const storedMsgs = localStorage.getItem(`doc_intel_chat_msg_${id}`);
                if (storedMsgs) {
                    messages = JSON.parse(storedMsgs);
                }
            } catch (e) {}
            
            if (messages.length === 0) {
                try {
                    const res = await fetch(`/api/chats/${id}`);
                    if (res.ok) {
                        messages = await res.json();
                        localStorage.setItem(`doc_intel_chat_msg_${id}`, JSON.stringify(messages));
                    }
                } catch (e) {
                    console.error("Failed to fetch chat messages from server", e);
                }
            }
            
            const wrapper = document.getElementById('messages-wrapper');
            wrapper.innerHTML = '';
            
            if (messages.length === 0) {
                showWelcomeMessage();
            } else {
                messages.forEach(msg => {
                    appendMessageMarkup(msg.role, msg.text, msg.citations);
                });
            }
            renderChatHistory();

            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            }
        }

        async function deleteChat(id, event) {
            if (event) event.stopPropagation();
            
            localStorage.removeItem(`doc_intel_chat_msg_${id}`);
            
            chatIndex = chatIndex.filter(c => c.id !== id);
            saveIndexToStorage();
            
            try {
                await fetch(`/api/chats/${id}`, { method: 'DELETE' });
            } catch (e) {
                console.error("Failed to delete chat from server", e);
            }
            
            if (currentChatId === id) {
                if (chatIndex.length > 0) {
                    await loadChat(chatIndex[0].id);
                } else {
                    await startNewChat();
                }
            } else {
                renderChatHistory();
            }
        }

        function renderChatHistory() {
            const list = document.getElementById('chat-history-list');
            list.innerHTML = '';
            
            chatIndex.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => loadChat(chat.id);
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'history-title';
                titleSpan.innerText = chat.title;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'history-delete-btn';
                delBtn.innerHTML = `
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                `;
                delBtn.onclick = (e) => deleteChat(chat.id, e);
                
                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        function showWelcomeMessage() {
            const wrapper = document.getElementById('messages-wrapper');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message`;
            msgDiv.id = 'initial-welcome-message';
            msgDiv.innerHTML = `
                <div class="message-body-container">
                    <div class="message-username">System</div>
                    <div class="message-content">
                        Welcome to the Document Intelligence interface. To query your document corpus:
                        <ol style="margin-left: 20px; margin-top: 8px;">
                            <li>Configure your target directory path in the top bar (e.g. <code>mock_s3/</code>).</li>
                            <li>Click <strong>Ingest</strong> to build the search mappings.</li>
                            <li>Submit your search queries or questions in the input field below.</li>
                        </ol>
                    </div>
                </div>
            `;
            wrapper.appendChild(msgDiv);
        }

        function renderMarkdown(text) {
            if (window.marked && typeof window.marked.parse === 'function') {
                return window.marked.parse(text);
            }
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        async function ingestDocs() {
            const path = document.getElementById('s3-path').value.trim();
            const cascade = document.getElementById('cascade').checked;
            
            const btn = document.getElementById('ingest-btn');
            const icon = document.getElementById('ingest-icon');
            const btnText = document.getElementById('ingest-btn-text');
            
            const statusPanel = document.getElementById('status-panel');
            const statusDescText = document.getElementById('status-desc-text');

            if (!path) {
                alert("Please specify a valid S3 or local path directory.");
                return;
            }

            btn.disabled = true;
            const originalIconHTML = icon.outerHTML;
            btnText.innerText = "Ingesting...";
            icon.outerHTML = '<span class="btn-loader" id="ingest-icon"></span>';

            statusPanel.style.display = 'flex';
            statusPanel.className = 'inline-status processing';
            statusDescText.innerText = `Ingesting...`;

            try {
                const res = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ s3_path: path, cascade: cascade })
                });
                const data = await res.json();
                
                if(res.ok) {
                    statusPanel.className = 'inline-status success';
                    statusDescText.innerText = "Ingested";
                } else {
                    statusPanel.className = 'inline-status error';
                    statusDescText.innerText = "Error";
                }
            } catch(e) {
                statusPanel.className = 'inline-status error';
                statusDescText.innerText = "Failed";
            }

            btn.disabled = false;
            const currentLoader = document.getElementById('ingest-icon');
            if (currentLoader) {
                currentLoader.outerHTML = originalIconHTML;
            }
            btnText.innerText = "Ingest";
        }

        function appendMessageMarkup(role, htmlText, citations = null) {
            const welcomeMsg = document.getElementById('initial-welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }

            const wrapper = document.getElementById('messages-wrapper');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message`;
            
            const body = document.createElement('div');
            body.className = 'message-body-container';

            const username = document.createElement('div');
            username.className = 'message-username';
            username.innerText = role === 'user' ? 'User' : 'System';

            if (role !== 'user' && citations && citations.length > 0) {
                const bracketRegex = /\[([^\]]+)\]/g;
                htmlText = htmlText.replace(bracketRegex, (match, bracketContent) => {
                    if (bracketContent.includes('<a') || bracketContent.includes('href')) {
                        return match;
                    }
                    if (!/page|pg/i.test(bracketContent)) {
                        return match;
                    }
                    
                    const parts = bracketContent.split(';');
                    const renderedParts = parts.map(part => {
                        const trimmed = part.trim();
                        let docName = '';
                        let pagePart = '';
                        const commaIdx = trimmed.indexOf(',');
                        if (commaIdx !== -1) {
                            docName = trimmed.substring(0, commaIdx).trim();
                            pagePart = trimmed.substring(commaIdx + 1).trim();
                        } else {
                            const pageMatch = trimmed.match(/(page|pg)\s*\d+/i);
                            if (pageMatch) {
                                const idx = pageMatch.index;
                                docName = trimmed.substring(0, idx).trim();
                                pagePart = trimmed.substring(idx).trim();
                            }
                        }
                        
                        if (docName && pagePart) {
                            const pageNumMatch = pagePart.match(/\d+/);
                            if (pageNumMatch) {
                                const pageNum = parseInt(pageNumMatch[0]);
                                const c = citations.find(item => item.document.toLowerCase() === docName.toLowerCase());
                                if (c) {
                                    const pageSuffix = c.filepath.toLowerCase().endsWith('.pdf') ? `#page=${pageNum}` : '';
                                    const href = `/api/files/${encodeURIComponent(c.filepath)}${pageSuffix}`;
                                    return `<a href="${href}" target="_blank" class="inline-citation-link"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg><span>${docName}, ${pagePart}</span></a>`;
                                }
                            }
                        }
                        return trimmed;
                    });
                    return renderedParts.join('; ');
                });
            }

            const content = document.createElement('div');
            content.className = 'message-content';
            content.innerHTML = htmlText;

            body.appendChild(username);
            body.appendChild(content);

            msgDiv.appendChild(body);
            wrapper.appendChild(msgDiv);
            
            const container = document.getElementById('chat-container');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        async function appendMessage(role, htmlText, rawText, citations = null) {
            appendMessageMarkup(role, htmlText, citations);
            
            let messages = [];
            try {
                const storedMsgs = localStorage.getItem(`doc_intel_chat_msg_${currentChatId}`);
                if (storedMsgs) {
                    messages = JSON.parse(storedMsgs);
                }
            } catch (e) {
                messages = [];
            }
            
            messages.push({ role, text: htmlText, citations });
            localStorage.setItem(`doc_intel_chat_msg_${currentChatId}`, JSON.stringify(messages));
            
            const chatMeta = chatIndex.find(c => c.id === currentChatId);
            if (chatMeta) {
                chatMeta.updatedAt = Date.now();
                
                if (role === 'user' && chatMeta.title === 'New Chat') {
                    chatMeta.title = rawText.length > 25 ? rawText.substring(0, 25) + '...' : rawText;
                }
                
                chatIndex.sort((a, b) => b.updatedAt - a.updatedAt);
                saveIndexToStorage();
                renderChatHistory();
                
                await persistChatToServer(currentChatId);
            }
        }

        async function askQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            if (!question) return;

            await appendMessage('user', renderMarkdown(question), question);
            input.value = '';

            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'message';
            typingIndicator.id = 'typing-indicator-wrapper';
            typingIndicator.innerHTML = `
                <div class="message-body-container">
                    <div class="message-username">System</div>
                    <div class="typing-bubble">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            `;
            document.getElementById('messages-wrapper').appendChild(typingIndicator);
            
            const container = document.getElementById('chat-container');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await res.json();
                
                const indicator = document.getElementById('typing-indicator-wrapper');
                if (indicator) {
                    indicator.remove();
                }
                
                if (res.ok) {
                    await appendMessage('ai', renderMarkdown(data.answer), data.answer, data.citations);
                } else {
                    await appendMessage('ai', `<span style="color: var(--error)">Error during query processing: ${data.detail || "Unknown internal error"}</span>`, "Error");
                }
            } catch(e) {
                const indicator = document.getElementById('typing-indicator-wrapper');
                if (indicator) {
                    indicator.remove();
                }
                await appendMessage('ai', '<span style="color: var(--error)">Failed to contact query service.</span>', "Failed");
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                askQuestion();
            }
        }

        // --- Drag/Resize Left Sidebar Functionality (Desktop) ---
        function makeSidebarResizable() {
            const sidebar = document.querySelector('.sidebar');
            const handle = document.getElementById('resize-handle');
            
            let isResizing = false;
            
            handle.addEventListener('mousedown', function(e) {
                isResizing = true;
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'col-resize';
                handle.classList.add('active');
            });
            
            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                
                let newWidth = e.clientX;
                
                // Enforce range bounds for sidebar width
                if (newWidth < 180) newWidth = 180;
                if (newWidth > 450) newWidth = 450;
                
                sidebar.style.width = newWidth + 'px';
                document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
            });
            
            document.addEventListener('mouseup', function(e) {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                    handle.classList.remove('active');
                }
            });
        }

        // --- Toggle Sidebar Menu (Mobile) ---
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        // --- Toggle Ingest Options Panel Drawer (Mobile) ---
        function toggleConfigDrawer() {
            const toolbar = document.getElementById('ingest-toolbar');
            toolbar.classList.toggle('open');
        }

        // Initialize chats list on page load
        window.addEventListener('DOMContentLoaded', initChats);
    </script>
</body>
